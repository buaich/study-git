name: CI

# when PR to main branch, workflow execute
on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Pull PR code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install node environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm #start pnpm cache!

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check changeset status
        run: pnpm changeset status --output /tmp/status.json
